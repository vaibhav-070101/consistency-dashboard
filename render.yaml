services:
  - type: web
    name: consistency-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consistency-db
          property: connectionString
    plan: free

databases:
  - name: consistency-db
    plan: free
